<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle glow overlay -->
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Central gear -->
  <g transform="translate(256,240)">
    <!-- Gear teeth -->
    <path d="M0,-85 L12,-85 L15,-70 L-15,-70 L-12,-85Z" fill="white" opacity="0.95" transform="rotate(0)"/>
    <path d="M0,-85 L12,-85 L15,-70 L-15,-70 L-12,-85Z" fill="white" opacity="0.95" transform="rotate(45)"/>
    <path d="M0,-85 L12,-85 L15,-70 L-15,-70 L-12,-85Z" fill="white" opacity="0.95" transform="rotate(90)"/>
    <path d="M0,-85 L12,-85 L15,-70 L-15,-70 L-12,-85Z" fill="white" opacity="0.95" transform="rotate(135)"/>
    <path d="M0,-85 L12,-85 L15,-70 L-15,-70 L-12,-85Z" fill="white" opacity="0.95" transform="rotate(180)"/>
    <path d="M0,-85 L12,-85 L15,-70 L-15,-70 L-12,-85Z" fill="white" opacity="0.95" transform="rotate(225)"/>
    <path d="M0,-85 L12,-85 L15,-70 L-15,-70 L-12,-85Z" fill="white" opacity="0.95" transform="rotate(270)"/>
    <path d="M0,-85 L12,-85 L15,-70 L-15,-70 L-12,-85Z" fill="white" opacity="0.95" transform="rotate(315)"/>

    <!-- Gear body -->
    <circle cx="0" cy="0" r="68" fill="white" opacity="0.95"/>
    <circle cx="0" cy="0" r="30" fill="url(#bg)"/>
  </g>

  <!-- Connection nodes (representing DI wiring) -->
  <!-- Top-left node -->
  <circle cx="120" cy="130" r="22" fill="white" opacity="0.85"/>
  <circle cx="120" cy="130" r="10" fill="url(#bg)"/>

  <!-- Top-right node -->
  <circle cx="392" cy="130" r="22" fill="white" opacity="0.85"/>
  <circle cx="392" cy="130" r="10" fill="url(#bg)"/>

  <!-- Bottom-left node -->
  <circle cx="120" cy="350" r="22" fill="white" opacity="0.85"/>
  <circle cx="120" cy="350" r="10" fill="url(#bg)"/>

  <!-- Bottom-right node -->
  <circle cx="392" cy="350" r="22" fill="white" opacity="0.85"/>
  <circle cx="392" cy="350" r="10" fill="url(#bg)"/>

  <!-- Connection lines from nodes to center gear -->
  <line x1="140" y1="145" x2="205" y2="200" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="372" y1="145" x2="307" y2="200" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="140" y1="335" x2="205" y2="280" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="372" y1="335" x2="307" y2="280" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>

  <!-- Label -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="36" fill="white" opacity="0.95">AutoWiring</text>
  <text x="256" y="462" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="white" opacity="0.7">.NET DI</text>
</svg>
